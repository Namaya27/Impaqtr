name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Playwright and dependencies
        run: |
          pip install playwright
          playwright install chromium
          
      - name: Run Headless Browser to wake app
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              # Replace with your actual URL
              page.goto('https://impaqtrdatasharing.streamlit.app/')
              # Wait for a specific element to ensure the app is fully loaded
              page.wait_for_selector('[data-testid=\"stAppViewContainer\"]', timeout=60000)
              print('App successfully loaded')
              browser.close()
          "
