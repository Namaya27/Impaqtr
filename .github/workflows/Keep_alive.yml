name: Keep Streamlit Alive

on:
  schedule:
    # This runs every 6 hours
    - cron: '0 */6 * * *'
  # This allows you to click a button to test it manually
  workflow_dispatch: 

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping the app
        run: |
          # Replace the URL below with your actual Streamlit App URL
          curl -I https://impaqtrdatasharing.streamlit.app/
