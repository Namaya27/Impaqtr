name: Keep Streamlit Alive

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: 

jobs:
  ping:
    # Use the official Microsoft Playwright container
    runs-on: ubuntu-latest
    container: mcr.microsoft.com/playwright/python:v1.44.0-jammy
    steps:
      - name: Wake the App
        run: |
          python -c "
          from playwright.sync_api import sync_playwright
          import time
          with sync_playwright() as p:
              browser = p.chromium.launch()
              page = browser.new_page()
              print('Navigating to app...')
              page.goto('https://impaqtr.streamlit.app/')
              # We wait for the app container to ensure it loaded
              page.wait_for_selector('[data-testid=\"stAppViewContainer\"]', timeout=60000)
              print('App successfully loaded!')
              browser.close()
          "
